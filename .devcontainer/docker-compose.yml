# Devcontainer topology: the dev workspace plus the default (stalwart) test backend.
services:
  app:
    image: mcr.microsoft.com/devcontainers/dotnet:10.0
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      AS_TEST_STACK: stalwart
      AS_TEST_IMAP_HOST: stalwart
      AS_TEST_IMAP_PORT: "143"
      AS_TEST_SMTP_HOST: stalwart
      AS_TEST_SMTP_PORT: "587"
      AS_TEST_DAV_URL: http://stalwart:8080
    depends_on:
      stalwart:
        condition: service_healthy

  # 0.16 line: custom test image (pinned server + stalwart-cli), self-provisioning on boot.
  stalwart:
    build:
      context: ../docker/backends/stalwart
    image: activesync-stalwart-test:0.16
    environment:
      STALWART_RECOVERY_ADMIN: "admin:secret"
    volumes:
      - stalwart-etc:/etc/stalwart
      - stalwart-data:/var/lib/stalwart
    healthcheck:
      test: ["CMD-SHELL", "test -f /etc/stalwart/.provisioned && curl -fsS -o /dev/null http://127.0.0.1:8080/.well-known/jmap"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 20s

volumes:
  stalwart-etc:
  stalwart-data:
