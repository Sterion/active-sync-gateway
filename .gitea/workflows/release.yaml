# One-click release: Actions -> Create Release -> enter the version. The ORDER is the
# point — the release (with generated notes) must exist before the tag build finishes:
#   1. the tag is pushed as a REAL git push with the BUILD_TOKEN PAT, which reliably
#      triggers build.yaml (the workflow's own token could be loop-prevented, and
#      API-created tags have fired push events unreliably across Gitea versions);
#   2. the release object is created for the now-existing tag with notes generated from
#      the commit subjects since the previous tag;
#   3. build.yaml (tag run) tests, pushes the image and ATTACHES the download zips to
#      this release — its attach step reuses an existing release untouched.
# Manual tagging keeps working: build.yaml creates a minimal release when none exists.
name: Create Release
run-name: ${{ gitea.actor }} releases ${{ gitea.event.inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (X.Y.Z or vX.Y.Z)'
        required: true
      headline:
        description: 'Optional headline paragraph for the release notes'
        required: false
        default: ''

jobs:
  Release:
    runs-on: ubuntu-latest
    steps:
      # Full history + tags: the changelog needs the previous tag and everything since.
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate version
        id: tag
        env:
          VERSION_INPUT: ${{ gitea.event.inputs.version }}
        run: |
          tag="v${VERSION_INPUT#v}"
          if ! echo "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$'; then
            echo "'$VERSION_INPUT' is not a valid version (X.Y.Z or vX.Y.Z)" >&2
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "tag $tag already exists" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # Notes = optional headline + commit subjects since the previous RELEASE + where
      # the image lives. Baseline is the latest existing release (API), not the latest
      # tag: a deleted release leaves its tag behind, and readers compare against the
      # releases page — "changes since v1.0.7" is meaningless if v1.0.7 was deleted.
      # The zips line manages expectations: assets appear when the tag build is green.
      - name: Generate release notes
        id: notes
        env:
          HEADLINE: ${{ gitea.event.inputs.headline }}
        run: |
          prev=$(curl -sf -H "Authorization: token ${{ secrets.BUILD_TOKEN }}" \
            "${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}/releases?draft=false&pre-release=false&limit=1" |
            grep -o '"tag_name":"[^"]*"' | head -1 | cut -d'"' -f4 || true)
          # A release whose tag was deleted cannot anchor git log — full history then.
          if [ -n "$prev" ] && ! git rev-parse -q --verify "refs/tags/$prev" >/dev/null; then
            echo "latest release tag $prev no longer exists as a git tag; using full history" >&2
            prev=""
          fi
          {
            echo "notes<<NOTES_EOF"
            if [ -n "$HEADLINE" ]; then
              echo "$HEADLINE"
              echo ""
            fi
            if [ -n "$prev" ]; then
              echo "## Changes since $prev"
            else
              echo "## Changes"
            fi
            git log ${prev:+$prev..}HEAD --format='- %s'
            echo ""
            echo "**Docker image:** \`${{ vars.REGISTRY }}/${{ gitea.repository }}:${{ steps.tag.outputs.tag }}\`"
            echo ""
            echo "_Download zips are attached automatically once the tag build passes._"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      # A real push with the PAT so the tag run of build.yaml fires unconditionally.
      - name: Create and push tag
        run: |
          tag='${{ steps.tag.outputs.tag }}'
          git tag "$tag"
          host=$(echo "${{ gitea.server_url }}" | sed -E 's#^[a-z]+://##')
          git push "https://${{ gitea.actor }}:${{ secrets.BUILD_TOKEN }}@$host/${{ gitea.repository }}.git" "$tag"

      # Tag exists now, so this only creates the release object with the notes; the tag
      # build attaches the zip files to it when the full suite is green.
      - name: Create release
        uses: https://gitea.com/actions/gitea-release-action@v1
        with:
          token: ${{ secrets.BUILD_TOKEN }}
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}

      - name: Summary
        run: |
          echo "Release ${{ steps.tag.outputs.tag }} created:"
          echo "  ${{ gitea.server_url }}/${{ gitea.repository }}/releases/tag/${{ steps.tag.outputs.tag }}"
          echo "The tag build is now running - it pushes the docker image and attaches the download zips when green."
