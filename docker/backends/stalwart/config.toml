# Stalwart test backend for the ActiveSync gateway integration tests.
# Plaintext everywhere — NEVER use this configuration outside of tests.

[server]
hostname = "mail.example.com"

[server.listener.smtp]
bind = ["[::]:25"]
protocol = "smtp"

[server.listener.submission]
bind = ["[::]:587"]
protocol = "smtp"

[server.listener.imap]
bind = ["[::]:143"]
protocol = "imap"

[server.listener.http]
bind = ["[::]:8080"]
protocol = "http"

[server.listener.sieve]
bind = ["[::]:4190"]
protocol = "managesieve"

[storage]
data = "rocksdb"
fts = "rocksdb"
blob = "rocksdb"
lookup = "rocksdb"
directory = "internal"

[store.rocksdb]
type = "rocksdb"
path = "/opt/stalwart/data"
compression = "lz4"

[directory.internal]
type = "internal"
store = "rocksdb"

# NOTE: queue.* settings (e.g. the built-in inbound rate limits) live in Stalwart's
# internal store and are IGNORED here — provision.sh disables them via the management API.

# Allow AUTH PLAIN/LOGIN without TLS (test-only).
[session.auth]
mechanisms = "[plain, login]"
directory = "'internal'"

[auth.plaintext]
allow-insecure = true

[authentication.fallback-admin]
user = "admin"
secret = "secret"

[tracer.stdout]
type = "stdout"
level = "info"
ansi = false
enable = true
