# Stalwart all-in-one test backend (default stack): IMAP + SMTP submission with real local
# delivery, ManageSieve, CalDAV/CardDAV, and JMAP (mail + calendars + contacts + vacation),
# one container. Self-provisioning — see entrypoint.sh.
#
#   docker compose -f docker/backends/stalwart/docker-compose.yml up -d --wait
#
# Published host ports: IMAP 143, SMTP submission 587, ManageSieve 4190, HTTP 5232 (DAV +
# JMAP, both on the container's 8080 listener).
# Users: user1@example.com / user2@example.com, password "pass".
services:
  stalwart:
    # 0.16 line: configuration lives in the data store, written through the server's JMAP
    # management API. entrypoint.sh drives first-run setup (bootstrap -> restart -> settings
    # -> restart -> users) using the curl + bash already in the image, so the stack is fully
    # self-contained with no mounted config and no external provisioner.
    image: stalwartlabs/stalwart:v0.16.13
    entrypoint: ["/usr/bin/bash", "/entrypoint.sh"]
    environment:
      # Pins the recovery administrator entrypoint.sh authenticates as.
      STALWART_RECOVERY_ADMIN: "admin:secret"
    ports:
      - "143:143"
      - "587:587"
      - "4190:4190"
      - "5232:8080"
    volumes:
      - ./entrypoint.sh:/entrypoint.sh:ro
      - stalwart-etc:/etc/stalwart
      - stalwart-data:/var/lib/stalwart
    healthcheck:
      # Healthy only once provisioning has finished (marker) and HTTP answers.
      test: ["CMD-SHELL", "test -f /etc/stalwart/.provisioned && curl -fsS -o /dev/null http://127.0.0.1:8080/.well-known/jmap"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 20s

volumes:
  stalwart-etc:
  stalwart-data:
