# Stalwart all-in-one test backend (default stack): IMAP + SMTP submission with real local
# delivery, ManageSieve, CalDAV/CardDAV, and JMAP (mail + calendars + contacts + vacation),
# one container. Self-provisioning via stalwart-cli baked into the image — see Dockerfile +
# entrypoint.sh.
#
#   docker compose -f docker/backends/stalwart/docker-compose.yml up -d --build --wait
#
# Published host ports default to canonical: IMAP 143, SMTP submission 587, ManageSieve 4190,
# HTTP 5232 (DAV + JMAP, both on the container's 8080 listener). They can be overridden via
# STALWART_IMAP_PORT / STALWART_SMTP_PORT / STALWART_SIEVE_PORT / STALWART_HTTP_PORT so this stack
# can run on dedicated ports alongside another backend (used by scripts/test-fast for parallel
# local runs). Unset = canonical, so CI and the devcontainer are unaffected.
# Users: user1@example.com / user2@example.com, password "pass".
services:
  stalwart:
    # Custom test image: pinned Stalwart 0.16 + stalwart-cli, provisioned declaratively on
    # first boot (bootstrap -> restart -> apply settings/listeners -> restart -> apply users).
    build:
      context: .
    image: activesync-stalwart-test:0.16
    environment:
      # Pins the recovery administrator stalwart-cli authenticates as.
      STALWART_RECOVERY_ADMIN: "admin:secret"
    ports:
      - "${STALWART_IMAP_PORT:-143}:143"
      - "${STALWART_SMTP_PORT:-587}:587"
      - "${STALWART_SIEVE_PORT:-4190}:4190"
      - "${STALWART_HTTP_PORT:-5232}:8080"
    volumes:
      - stalwart-etc:/etc/stalwart
      - stalwart-data:/var/lib/stalwart
    healthcheck:
      # Healthy only once provisioning has finished (marker) and HTTP answers.
      test: ["CMD-SHELL", "test -f /etc/stalwart/.provisioned && curl -fsS -o /dev/null http://127.0.0.1:8080/.well-known/jmap"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 20s

volumes:
  stalwart-etc:
  stalwart-data:
