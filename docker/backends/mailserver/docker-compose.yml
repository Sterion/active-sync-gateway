# Second test backend (CI + local): docker-mailserver (Postfix + Dovecot) for mail and
# Radicale for CalDAV/CardDAV. Same published ports and users as the stalwart stack, so the
# only switch between stacks is AS_TEST_STACK. Runs in the build.yaml integration matrix and
# via scripts/test-backends.ps1 (or .sh).
#
#   docker compose -f docker/backends/mailserver/docker-compose.yml up -d --wait
#   $env:AS_TEST_STACK = "mailserver"      (sets DAV HomeSetPath to "/{user}/")
#   dotnet test --filter Category=Integration
#
# Users are declared in config/postfix-accounts.cf (password "pass"); the radicale-provision
# one-shot creates each user's default calendar + address book (Radicale ships none, so DAV
# discovery would otherwise find nothing). Plaintext everywhere — test use exclusively.
services:
  mailserver:
    image: mailserver/docker-mailserver:15.1.0
    hostname: mail.example.com
    # Anchor the one-shot provisioner to a long-running service as an expected-completion
    # dependency: without this, `docker compose up --wait` treats radicale-provision's (0) exit
    # as an unexpected container death and returns exit 1, failing the CI bring-up step even
    # though everything is healthy.
    depends_on:
      radicale-provision:
        condition: service_completed_successfully
    ports:
      - "143:143"
      - "587:587"
    environment:
      SSL_TYPE: ""              # no TLS — test only
      ENABLE_CLAMAV: "0"
      ENABLE_AMAVIS: "0"
      ENABLE_RSPAMD: "0"
      ENABLE_SPAMASSASSIN: "0"
      ENABLE_OPENDKIM: "0"
      ENABLE_OPENDMARC: "0"
      ENABLE_POLICYD_SPF: "0"
      ENABLE_FAIL2BAN: "0"
      SPOOF_PROTECTION: "0"
      PERMIT_DOCKER: connected-network
      LOG_LEVEL: warn
    volumes:
      - ./config/:/tmp/docker-mailserver/
      - mailserver-data:/var/mail
      - mailserver-state:/var/mail-state
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 143 && nc -z 127.0.0.1 587"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s

  radicale:
    image: tomsquest/docker-radicale:3.7.6.0
    ports:
      - "5232:5232"
    volumes:
      - radicale-data:/data
      - ./radicale/config:/config/config:ro
      - ./radicale/users:/config/users:ro

  # One-shot: create user1/user2 default calendar + address book so DAV discovery has
  # something to find (Radicale auto-creates no collections). Idempotent; `up --wait` blocks
  # until it exits 0.
  radicale-provision:
    image: curlimages/curl:8.11.1
    depends_on:
      radicale:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./radicale/provision.sh:/provision.sh:ro
    entrypoint: ["sh", "/provision.sh"]

volumes:
  mailserver-data:
  mailserver-state:
  radicale-data:
