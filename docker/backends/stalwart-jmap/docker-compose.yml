# Stalwart 0.16 JMAP-groupware test backend: JMAP mail + calendars + contacts +
# vacationresponse, all over the one HTTP listener. Used by the JMAP contacts/calendar
# integration tests (the default 0.13 stack under ../stalwart does NOT advertise the
# calendars/contacts capabilities).
#
#   docker compose -f docker/backends/stalwart-jmap/docker-compose.yml up -d --wait
#
# 0.16 dropped the mounted-TOML bootstrap the 0.13 stack uses; instead it starts in
# "bootstrap mode" (no config file) which already serves the full JMAP surface for the
# built-in administrator. STALWART_RECOVERY_ADMIN pins that admin to a stable credential
# so tests can log in deterministically. Single account (admin) — enough for the
# single-user contact/calendar CRUD round-trips. Plaintext, test use only.
#
# Published host port: JMAP/HTTP 18080. Login: admin / secret.
services:
  stalwart-jmap:
    image: stalwartlabs/stalwart:v0.16.13
    environment:
      STALWART_RECOVERY_ADMIN: "admin:secret"
    ports:
      - "18080:8080"
    volumes:
      - stalwart-jmap-data:/opt/stalwart
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 3s
      timeout: 3s
      retries: 30

volumes:
  stalwart-jmap-data:
