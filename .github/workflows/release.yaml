# GitHub twin of .gitea/workflows/release.yaml — one-click release from the Actions tab.
# NORMAL flow is still: release from Gitea, and the tag reaches GitHub via the push
# mirror (build.yaml then creates the GitHub release + assets automatically). This
# workflow exists for parity / emergencies; note a tag created HERE never flows back to
# Gitea (the mirror is one-way).
#
# GitHub-specific ordering twist: a tag pushed with the built-in GITHUB_TOKEN does NOT
# fire other workflows (loop prevention), so instead of relying on the tag push event
# this workflow dispatches build.yaml explicitly against the tag ref.
name: Create Release
run-name: ${{ github.actor }} releases ${{ github.event.inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (X.Y.Z or vX.Y.Z)'
        required: true
      headline:
        description: 'Optional headline paragraph for the release notes'
        required: false
        default: ''

permissions:
  contents: write
  actions: write

jobs:
  Release:
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    steps:
      # Full history + tags: the changelog needs the previous tag and everything since.
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate version
        id: tag
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          tag="v${VERSION_INPUT#v}"
          if ! echo "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$'; then
            echo "'$VERSION_INPUT' is not a valid version (X.Y.Z or vX.Y.Z)" >&2
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "tag $tag already exists" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # Notes = optional headline + commit subjects since the previous RELEASE + where
      # the image lives. Baseline is the latest existing release (API), not the latest
      # tag: a deleted release leaves its tag behind, and readers compare against the
      # releases page. The zips line manages expectations: assets appear when the tag
      # build is green.
      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEADLINE: ${{ github.event.inputs.headline }}
        run: |
          prev=$(gh api "repos/${{ github.repository }}/releases/latest" --jq .tag_name 2>/dev/null || true)
          # A release whose tag was deleted cannot anchor git log — full history then.
          if [ -n "$prev" ] && ! git rev-parse -q --verify "refs/tags/$prev" >/dev/null; then
            echo "latest release tag $prev no longer exists as a git tag; using full history" >&2
            prev=""
          fi
          {
            if [ -n "$HEADLINE" ]; then
              echo "$HEADLINE"
              echo ""
            fi
            if [ -n "$prev" ]; then
              echo "## Changes since $prev"
            else
              echo "## Changes"
            fi
            git log ${prev:+$prev..}HEAD --format='- %s'
            echo ""
            echo "**Docker image:** \`ghcr.io/${GITHUB_REPOSITORY,,}:${{ steps.tag.outputs.tag }}\`"
            echo ""
            echo "_Download zips are attached automatically once the tag build passes._"
          } > release-notes.md

      # checkout persists the workflow token for pushes; the push itself will NOT fire
      # build.yaml (GITHUB_TOKEN loop prevention) — the explicit dispatch below does.
      - name: Create and push tag
        run: |
          git tag '${{ steps.tag.outputs.tag }}'
          git push origin '${{ steps.tag.outputs.tag }}'

      # Tag exists now, so this only creates the release object with the notes; the tag
      # build attaches the zip files to it when the full suite is green.
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create '${{ steps.tag.outputs.tag }}' \
            --title '${{ steps.tag.outputs.tag }}' --notes-file release-notes.md

      - name: Trigger tag build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run build.yaml --ref 'refs/tags/${{ steps.tag.outputs.tag }}'

      - name: Summary
        run: |
          echo "Release ${{ steps.tag.outputs.tag }} created:"
          echo "  ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.tag }}"
          echo "The tag build was dispatched - it pushes the docker image and attaches the download zips when green."
